# pali.schema.yaml
schema:
  schema_id: pali
  name: Pa
  version: "1.0"
  description: Pali Language

switches:
  - name: ascii_mode
    reset: 0
    states: [ 编码, 字符 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator

translator:
  dictionary: pali
  enable_user_dict: false
  enable_sentence: false
  preedit_format: []

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'^\""
  delimiter: ""
  max_code_length: 4
  auto_select: false

punctuator:
  full_shape:
    " ": { commit: " " }
    ".": { commit: "." }
    ",": { commit: "," }
    "?": { commit: "?" }
    "!": { commit: "!" }
  half_shape:
    " ": { commit: " " }
    ".": { commit: "." }
    ",": { commit: "," }
    "?": { commit: "?" }
    "!": { commit: "!" }